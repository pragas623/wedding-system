<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-wrapper">
    <div class="container">

        <div class="topbar">
            <div class="brand">Menu Management</div>
            <div class="nav-buttons">
                <button class="btn-primary btn-inline" onclick="window.location.href='/dashboard.html'">Dashboard</button>
                <button class="btn-primary btn-inline" onclick="window.location.href='/index.html'">Hall</button>
                <button class="btn-secondary btn-inline" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="messageBox"></div>

        <div class="card">
            <h2 class="form-title">Add Menu Package</h2>

            <label>Menu Name</label>
            <input type="text" id="menuName" placeholder="Enter menu name">

            <label>Food Items</label>
            <textarea id="foodItems" placeholder="Enter food items"></textarea>

            <label>Price Per Person</label>
            <input type="number" id="pricePerPerson" placeholder="Enter price">

            <label>Description</label>
            <input type="text" id="description" placeholder="Enter description">

            <label>Status</label>
            <select id="status">
                <option value="Available">Available</option>
                <option value="Unavailable">Unavailable</option>
            </select>

            <button class="btn-primary" onclick="addMenu()">Create Menu</button>
        </div>

        <div class="card">
            <h2 class="form-title">Menu List</h2>

            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Menu Name</th>
                    <th>Food Items</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>CRUD</th>
                </tr>
                </thead>
                <tbody id="menuTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem("loggedUser"));
    if (!user) {
        alert("Please login first");
        window.location.href = "/login.html";
    }

    function logout() {
        localStorage.removeItem("loggedUser");
        window.location.href = "/login.html";
    }

    function showMessage(text, type = "success") {
        const box = document.getElementById("messageBox");
        box.innerHTML = `<div class="alert ${type === "success" ? "alert-success" : "alert-error"}">${text}</div>`;
    }

    async function loadMenus() {
        const res = await fetch("/menu");
        const data = await res.json();

        const tbody = document.getElementById("menuTableBody");
        tbody.innerHTML = "";

        data.forEach(menu => {
            tbody.innerHTML += `
                <tr>
                    <td>${menu.id}</td>
                    <td>${menu.menuName}</td>
                    <td>${menu.foodItems}</td>
                    <td>${menu.pricePerPerson}</td>
                    <td>${menu.description || ""}</td>
                    <td>${menu.status || ""}</td>
                    <td>
                        <button class="btn-warning btn-inline" onclick='updateMenu(${menu.id}, ${JSON.stringify(JSON.stringify(menu.menuName))}, ${JSON.stringify(JSON.stringify(menu.foodItems))}, ${menu.pricePerPerson}, ${JSON.stringify(JSON.stringify(menu.description || ""))}, ${JSON.stringify(JSON.stringify(menu.status || "Available"))})'>Update</button>
                        <button class="btn-danger btn-inline" onclick='deleteMenu(${menu.id})'>Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    async function addMenu() {
        const menuName = document.getElementById("menuName").value.trim();
        const foodItems = document.getElementById("foodItems").value.trim();
        const pricePerPerson = parseFloat(document.getElementById("pricePerPerson").value);
        const description = document.getElementById("description").value.trim();
        const status = document.getElementById("status").value;

        if (!menuName) {
            showMessage("Menu name is required", "error");
            return;
        }

        if (!foodItems) {
            showMessage("Food items are required", "error");
            return;
        }

        if (!pricePerPerson || pricePerPerson <= 0) {
            showMessage("Price must be greater than 0", "error");
            return;
        }

        const payload = {
            menuName,
            foodItems,
            pricePerPerson,
            description,
            status
        };

        const res = await fetch("/menu", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.error) {
            showMessage(data.error, "error");
        } else {
            showMessage(data.message, "success");
            document.getElementById("menuName").value = "";
            document.getElementById("foodItems").value = "";
            document.getElementById("pricePerPerson").value = "";
            document.getElementById("description").value = "";
            document.getElementById("status").value = "Available";
            loadMenus();
        }
    }

    async function updateMenu(id, oldName, oldFoods, oldPrice, oldDescription, oldStatus) {
        const menuName = prompt("Update menu name:", JSON.parse(oldName));
        if (menuName === null) return;

        const foodItems = prompt("Update food items:", JSON.parse(oldFoods));
        if (foodItems === null) return;

        const priceInput = prompt("Update price per person:", oldPrice);
        if (priceInput === null) return;

        const description = prompt("Update description:", JSON.parse(oldDescription));
        if (description === null) return;

        const status = prompt("Update status (Available / Unavailable):", JSON.parse(oldStatus));
        if (status === null) return;

        const pricePerPerson = parseFloat(priceInput);

        if (!menuName.trim()) {
            showMessage("Menu name is required", "error");
            return;
        }

        if (!foodItems.trim()) {
            showMessage("Food items are required", "error");
            return;
        }

        if (!pricePerPerson || pricePerPerson <= 0) {
            showMessage("Price must be greater than 0", "error");
            return;
        }

        const payload = {
            menuName: menuName.trim(),
            foodItems: foodItems.trim(),
            pricePerPerson,
            description: description.trim(),
            status: status.trim()
        };

        const res = await fetch(`/menu/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.error) {
            showMessage(data.error, "error");
        } else {
            showMessage(data.message, "success");
            loadMenus();
        }
    }

    async function deleteMenu(id) {
        const ok = confirm("Are you sure you want to delete this menu?");
        if (!ok) return;

        const res = await fetch(`/menu/${id}`, {
            method: "DELETE"
        });

        const data = await res.json();

        if (data.error) {
            showMessage(data.error, "error");
        } else {
            showMessage(data.message, "success");
            loadMenus();
        }
    }

    loadMenus();
</script>
</body>
</html>
